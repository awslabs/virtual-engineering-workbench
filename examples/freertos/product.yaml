# kics-scan disable=1819ac03-542b-4026-976b-f37addd59f3b,b7063015-6c31-4658-a8e7-14f98f37fd42,8d29754a-2a18-460d-a1ba-91009f8d359da
---
AWSTemplateFormatVersion: 2010-09-09
Description: Version {{ product_version }} template for {{ product_name }} Virtual Target
Mappings:
  RegionMap:
    us-east-1:
      AMIId: "{{ ami_ids['us-east-1'] }}"
Metadata:
  AWS::CloudFormation::Interface:
    ParameterLabels:
      InstanceType:
        default: "What type of virtual target do you want to start?"
      VolumeSize:
        default: "How much storage would you like to have?"
  ParameterMetadata:
    InstanceType:
      OptionLabels:
        m8i.xlarge: "General purpose: 4 vCPU, 16.0 GiB RAM"
      OptionWarnings:
        m8i.xlarge: "The selected virtual target type is only for testing purposes and may be too slow for actual work."
    VolumeSize:
      OptionLabels:
        "100": "100 GB"
Outputs:
  InstanceId:
    Description: InstanceId of the newly created EC2 instance
    Value: !Ref Workbench
  PrivateIP:
    Description: Private IP address of the newly created EC2 instance
    Value: !GetAtt Workbench.PrivateIp
  PublicIP:
    Description: Public IP address of the newly created EC2 instance
    Value: !GetAtt Workbench.PublicIp
  FeatureToggles:
    Description: Enabled features for this workbench
    Value: '[{ "feature": "WorkbenchWorkingDirectoryEnabled", "enabled": false }]'
  SSHKeyPair:
    Description: SSM Parameter containing the ssh key generated
    Value: !Join ["", ["/ec2/keypair/", !GetAtt KeyPair.KeyPairId]]
Parameters:
  InstanceType:
    AllowedValues: ["m8i.xlarge"]
    Default: "m8i.xlarge"
    Description: Amazon EC2 Instance Type
    Type: String
  SubnetId:
    Default: ""
    Description: Subnet ID where workbench is provisioned. VEW provides a subnet with the most IPs remaining.
    Type: AWS::EC2::Subnet::Id
  UserSecurityGroupId:
    Default: ""
    Description: Security group created for the user
    Type: AWS::EC2::SecurityGroup::Id
  VolumeSize:
    AllowedValues: [100]
    Default: 100
    Description: Amazon EBS Volume Size
    Type: String
  VpcIdSSM:
    Default: /workbench/vpc/vpc-id
    Type: AWS::SSM::Parameter::Value<String>
Resources:
  KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName:
        !Join [
          "-",
          [
            "KeyPair",
            !Select [
              4,
              !Split ["-", !Select [2, !Split ["/", !Ref AWS::StackId]]],
            ],
          ],
        ]
      KeyType: ed25519
  InstanceProfile:
    Properties:
      Roles:
        - !Ref InstanceRole
    Type: AWS::IAM::InstanceProfile
  InstanceRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          Action: sts:AssumeRole
          Effect: Allow
          Principal:
            Service: !Sub ec2.${AWS::URLSuffix}
        Version: 2012-10-17
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !Sub arn:aws:iam::${AWS::AccountId}:policy/ProvisionedProductInstanceProfilePermissionsPolicyV2
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Effect: Allow
                Resource:
                  - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*
                  - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*:log-stream:*
            Version: 2012-10-17
          PolicyName: AllowCWLogs
        - PolicyDocument:
            Statement:
              - Action: ec2:DescribeTags
                Condition:
                  StringEquals:
                    ec2:Region: !Ref AWS::Region
                Effect: Allow
                Resource: "*"
            Version: 2012-10-17
          PolicyName: Ec2DescribeTagsUserTID
        - PolicyDocument:
            Statement:
              # kics-scan ignore-line - Read-only access to DCV license bucket, not data exfiltration
              - Action: s3:GetObject
                Effect: Allow
                Resource: !Sub arn:aws:s3:::dcv-license.${AWS::Region}/*
            Version: 2012-10-17
          PolicyName: S3ForNICEDCVLicense
    Type: AWS::IAM::Role
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable ADB, STUN and VVRP
      SecurityGroupIngress:
        # kics-scan ignore-line - By design: port range required for inter-workbench communication, source restricted to UserSecurityGroupId
        - SourceSecurityGroupId: !Ref UserSecurityGroupId
          Description: Enable TCP connections from user workbenches and virtual targets
          FromPort: 1024
          ToPort: 65535
          IpProtocol: tcp
        # kics-scan ignore-line - By design: port range required for inter-workbench communication, source restricted to UserSecurityGroupId
        - SourceSecurityGroupId: !Ref UserSecurityGroupId
          Description: Enable UDP connections from user workbenches and virtual targets
          FromPort: 1024
          ToPort: 65535
          IpProtocol: udp
      SecurityGroupEgress:
        - IpProtocol: -1
          Description: Allow all outbound traffic for virtual target connectivity
          # kics-scan ignore-line - By design: virtual targets need unrestricted outbound for testing and validation
          CidrIp: 0.0.0.0/0
      VpcId: !Ref VpcIdSSM
  # kics-scan ignore-block - Detailed monitoring is a per-customer cost decision; instances monitored via CloudWatch agent and SSM
  Workbench:
    Properties:
      KeyName: !Ref KeyPair
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            Encrypted: true
            Iops: 3000
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
      IamInstanceProfile: !Ref InstanceProfile
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap
        - RegionMap
        - !Ref AWS::Region
        - AMIId
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
        - !Ref UserSecurityGroupId
      Tags:
        - Key: vew:virtualtarget:type
          Value: ""
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -e

          cat > /tmp/run_freertos_demo.sh <<'SCRIPT'
          #!/bin/bash -e

          cd /opt/freertos/FreeRTOS/Demo/CORTEX_MPS2_QEMU_IAR_GCC/build/gcc
          make -j$(nproc)
          qemu-system-arm -machine mps2-an385 -cpu cortex-m3 -kernel output/RTOSDemo.out -monitor none -nographic -serial stdio
          SCRIPT
          chmod +x /tmp/run_freertos_demo.sh
          nohup /tmp/run_freertos_demo.sh > /var/log/freertos-userdata.log 2>&1 &
    Type: AWS::EC2::Instance
