# kics-scan disable=1819ac03-542b-4026-976b-f37addd59f3b,b7063015-6c31-4658-a8e7-14f98f37fd42,8d29754a-2a18-460d-a1ba-9509f8d359da
---
AWSTemplateFormatVersion: 2010-09-09
Description: Version {{ product_version }} template for {{ product_name }} Virtual Target
Mappings:
  RegionMap:
    us-east-1:
      AMIId: "{{ ami_ids['us-east-1'] }}"
Metadata:
  AWS::CloudFormation::Interface:
    ParameterLabels:
      InstanceType:
        default: "What type of virtual target do you want to start?"
      VolumeSize:
        default: "How much storage would you like to have?"
  ParameterMetadata:
    InstanceType:
      OptionLabels:
        m8i.xlarge: "General purpose: 4 vCPU, 16.0 GiB RAM"
      OptionWarnings:
        m8i.xlarge: "The selected virtual target type is only for testing purposes and may be too slow for actual work."
    VolumeSize:
      OptionLabels:
        "50": "50 GB"
Outputs:
  InstanceId:
    Description: InstanceId of the newly created EC2 instance
    Value: !Ref Workbench
  PrivateIP:
    Description: Private IP address of the newly created EC2 instance
    Value: !GetAtt Workbench.PrivateIp
  FeatureToggles:
    Description: Enabled features for this workbench
    Value: '[{ "feature": "WorkbenchWorkingDirectoryEnabled", "enabled": false }]'
Parameters:
  # Modify both the AllowedValues and Default accordingly to the product requirements
  InstanceType:
    AllowedValues: ["m8i.xlarge"]
    Default: "m8i.xlarge"
    Description: Amazon EC2 Instance Type
    Type: String
  SubnetId:
    Default: ""
    Description: Subnet ID where workbench is provisioned. VEW provides a subnet with the most IPs remaining.
    Type: AWS::EC2::Subnet::Id
  UserSecurityGroupId:
    Default: ""
    Description: Security group created for the user
    Type: AWS::EC2::SecurityGroup::Id
  # Modify both the AllowedValues and Default accordingly to the product requirements
  VolumeSize:
    AllowedValues: [50]
    Default: 50
    Description: Amazon EBS Volume Size
    Type: String
  VpcIdSSM:
    Default: /workbench/vpc/vpc-id
    Type: AWS::SSM::Parameter::Value<String>
Resources:
  InstanceProfile:
    Properties:
      Roles:
        - !Ref InstanceRole
    Type: AWS::IAM::InstanceProfile
  InstanceRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          Action: sts:AssumeRole
          Effect: Allow
          Principal:
            Service: !Sub ec2.${AWS::URLSuffix}
        Version: 2012-10-17
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !Sub arn:aws:iam::${AWS::AccountId}:policy/ProvisionedProductInstanceProfilePermissionsPolicyV2
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Effect: Allow
                Resource:
                  - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*
                  - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*:log-stream:*
            Version: 2012-10-17
          PolicyName: AllowCWLogs
        - PolicyDocument:
            Statement:
              - Action: ec2:DescribeTags
                Condition:
                  StringEquals:
                    ec2:Region: !Ref AWS::Region
                Effect: Allow
                Resource: "*"
            Version: 2012-10-17
          PolicyName: Ec2DescribeTagsUserTID
        - PolicyDocument:
            Statement:
              # kics-scan ignore-line - Read-only access to DCV license bucket, not data exfiltration
              - Action: s3:GetObject
                Effect: Allow
                Resource: !Sub arn:aws:s3:::dcv-license.${AWS::Region}/*
            Version: 2012-10-17
          PolicyName: S3ForNICEDCVLicense
    Type: AWS::IAM::Role
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable ADB, STUN and VVRP
      SecurityGroupIngress:
        # kics-scan ignore-line - By design: port range required for inter-workbench communication, source restricted to UserSecurityGroupId
        - SourceSecurityGroupId: !Ref UserSecurityGroupId
          Description: Enable TCP connections from user workbenches and virtual targets
          FromPort: 1024
          ToPort: 65535
          IpProtocol: tcp
        # kics-scan ignore-line - By design: port range required for inter-workbench communication, source restricted to UserSecurityGroupId
        - SourceSecurityGroupId: !Ref UserSecurityGroupId
          Description: Enable UDP connections from user workbenches and virtual targets
          FromPort: 1024
          ToPort: 65535
          IpProtocol: udp
      SecurityGroupEgress:
        - IpProtocol: -1
          Description: Allow all outbound traffic for virtual target connectivity
          # kics-scan ignore-line - By design: virtual targets need unrestricted outbound for testing and validation
          CidrIp: 0.0.0.0/0
      VpcId: !Ref VpcIdSSM
  # kics-scan ignore-block - Detailed monitoring is a per-customer cost decision; instances monitored via CloudWatch agent and SSM
  Workbench:
    Properties:
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            Encrypted: true
            Iops: 3000
            # Define root volume size based on a use case
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
      IamInstanceProfile: !Ref InstanceProfile
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap
        - RegionMap
        - !Ref AWS::Region
        - AMIId
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
        - !Ref UserSecurityGroupId
      UserData:
        Fn::Base64: !Sub |
            ###################################
            # For Linux virtual targets use: #
            ###################################
            #!/bin/bash -e

            AWS_REGION="${AWS::Region}"
            AWS_STACK_NAME="${AWS::StackName}"

            set +e
            (
              set -e


              #############################
              # ... your user data script #
              #############################

            )

            exit_code=$?

            if [ $exit_code -ne 0 ]; then
              echo "User data script failed with $exit_code exit code"

              exit $exit_code
            fi

            ####################################
            # For Windows virtual targets use: #
            ####################################

            <powershell>
            $AWSRegion = "${AWS::Region}"
            $StackName = "${AWS::StackName}"

            try {
              Start-Transcript -Path "C:\Packages\cloud\tools\userdata.ps1.out"

              #############################
              # ... your user data script #
              #############################

            }
            catch {
              Write-Host $_.Exception.Message
            }
            </powershell>
    Type: AWS::EC2::Instance
