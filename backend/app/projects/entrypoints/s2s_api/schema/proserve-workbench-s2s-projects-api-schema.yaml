openapi: "3.0.1"
info:
  title: "Workbench Projects API"
  description: "API in charge of processing calls from internal services like RTC"
  version: "2023-04-12T12:00:00Z"
servers:
  - url: "https://{Host}/{BasePath}"
security:
  - ClientCredentials: []
x-amazon-apigateway-request-validators:
  all:
    validateRequestBody: true
    validateRequestParameters: true
  params-only:
    validateRequestBody: false
    validateRequestParameters: true
  body-only:
    validateRequestBody: true
    validateRequestParameters: false
  none:
    validateRequestBody: false
    validateRequestParameters: false
x-amazon-apigateway-request-validator: none
x-amazon-apigateway-gateway-responses:
  DEFAULT_4XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: "{{cors_origin}}"
      gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,x-amz-security-token,Cache-Control'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
    responseTemplates:
      application/json:
        "{ \"message\": \"Client error\", \"validationError\": \"\" }"
  BAD_REQUEST_PARAMETERS:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: "{{cors_origin}}"
      gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,x-amz-security-token,Cache-Control'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
    responseTemplates:
      application/json:
        "{ \"message\": $context.error.messageString, \"validationError\": \"$context.error.validationErrorString\" }"
  BAD_REQUEST_BODY:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: "{{cors_origin}}"
      gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,x-amz-security-token,Cache-Control'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
    responseTemplates:
      application/json:
        "{ \"message\": $context.error.messageString, \"validationError\": \"$context.error.validationErrorString\" }"
  DEFAULT_5XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: "{{cors_origin}}"
      gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,x-amz-security-token,Cache-Control'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
    responseTemplates:
      application/json:
        "{ \"message\": \"Server error\", \"validationError\": \"\" }"
paths:
  /projects:
    get:
      description: "Get all projects"
      operationId: "GetProjects"
      parameters:
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
        - name: nextToken
          in: query
          required: false
          schema:
            type: object
      responses:
        "200":
          description: "200 response"
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProjectsResponse"
      security:
        - ClientCredentials: ["clients/projects/program.read"]
      x-amazon-apigateway-request-validator: params-only
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/{{handler_arn}}/invocations"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        cacheKeyParameters:
          - "method.request.querystring.nextToken"
        contentHandling: "CONVERT_TO_TEXT"
        credentials: "{{apigw_invocation_role_arn}}"
  /projects/{projectId}/enrolments:
    post:
      description: "Request to be enrolled to a program"
      operationId: "EnrolUser"
      tags:
        - ALL
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/EnrolUserRequest"
        required: true
      responses:
        "201":
          description: "201 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrolUserResponse"
      security:
        - ClientCredentials: ["clients/projects/assignment.write"]
      x-amazon-apigateway-request-validator: all
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/{{handler_arn}}/invocations"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        contentHandling: "CONVERT_TO_TEXT"
        credentials: "{{apigw_invocation_role_arn}}"
  /projects/{projectId}/enrolments/pending:
    post:
      description: "Request to enrol a user without approving him automatically"
      operationId: "EnrolPendingUser"
      tags:
        - ALL
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/EnrolPendingUserRequest"
        required: true
      responses:
        "201":
          description: "201 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrolPendingUserResponse"
      security:
        - ClientCredentials: [ "clients/projects/assignment.write" ]
      x-amazon-apigateway-request-validator: all
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/{{handler_arn}}/invocations"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        contentHandling: "CONVERT_TO_TEXT"
        credentials: "{{apigw_invocation_role_arn}}"
  /projects/{projectId}/users:
    delete:
      description: "Remove multiple users from a specific project"
      operationId: "RemoveProjectUsers"
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RemoveUsersRequest"
      responses:
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveUsersResponse"
      security:
        - ClientCredentials: [ "clients/projects/assignment.write" ]
      x-amazon-apigateway-request-validator: params-only
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/{{handler_arn}}/invocations"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        contentHandling: "CONVERT_TO_TEXT"
        credentials: "{{apigw_invocation_role_arn}}"
    post:
      description: "Add a new user to a program/project"
      operationId: "AddProjectUser"
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AssignUserRequest"
        required: true
      responses:
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignUserResponse"
      security:
        - ClientCredentials: [ "clients/projects/assignment.write" ]
      x-amazon-apigateway-request-validator: all
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/{{handler_arn}}/invocations"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        contentHandling: "CONVERT_TO_TEXT"
        credentials: "{{apigw_invocation_role_arn}}"
    put:
      description: "Reassign users to different roles for a specific project"
      operationId: "ReAssignProjectUsers"
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ReAssignUsersRequest"
        required: true
      responses:
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReAssignUsersResponse"
      security:
        - ClientCredentials: [ "clients/projects/assignment.write" ]
      x-amazon-apigateway-request-validator: all
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/{{handler_arn}}/invocations"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        contentHandling: "CONVERT_TO_TEXT"
        credentials: "{{apigw_invocation_role_arn}}"
    get:
      description: "Get all users associated to a project"
      operationId: "GetProjectUsers"
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProjectAssignmentsResponse"
      security:
        - ClientCredentials: [ "clients/projects/assignment.read" ]
      x-amazon-apigateway-request-validator: params-only
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/{{handler_arn}}/invocations"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        cacheKeyParameters:
          - "method.request.header.Authorization"
          - "method.request.path.projectId"
        contentHandling: "CONVERT_TO_TEXT"
        credentials: "{{apigw_invocation_role_arn}}"
  /projects/{projectId}/users/{userId}:
    get:
      description: "Get all roles associated to a user in a project"
      operationId: "GetUserRoles"
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserRolesResponse"
      security:
        - ClientCredentials: [ "clients/projects/assignment.read" ]
      x-amazon-apigateway-request-validator: params-only
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/{{handler_arn}}/invocations"
        responses:
          default:
            statusCode: "200"
        passthroughBehavior: "when_no_match"
        cacheKeyParameters:
          - "method.request.header.Authorization"
          - "method.request.path.projectId"
        contentHandling: "CONVERT_TO_TEXT"
        credentials: "{{apigw_invocation_role_arn}}"
components:
  schemas:
    Empty:
      title: "Empty Schema"
      type: "object"
    Project:
      title: Project
      type: object
      required:
        - projectId
      properties:
        projectId:
          title: ProjectId
          type: string
          description: Unique ID of the project.
        projectName:
          title: ProjectName
          type: string
          description: Name of the project.
        projectDescription:
          title: ProjectDescription
          type: string
          description: Description of the project.
        createDate:
          title: CreateDate
          type: string
          description: Point in time where project is created.
        lastUpdateDate:
          title: LastUpdateDate
          type: string
          description: Point in time where project is last updated.
    GetProjectsResponse:
      title: GetProjectsResponse
      required:
        - projects
      type: object
      properties:
        nextToken:
          title: LastEvaluatedKey token
          nullable: true
          type: object
        projects:
          title: Projects
          type: array
          items:
            "$ref": "#/components/schemas/Project"
    EnrolUserRequest:
      title: EnrolUserRequest
      type: object
      required:
        - userId
        - userEmail
        - approverId
      properties:
        userId:
          title: UserId
          type: string
          description: ID of the user
        userEmail:
          title: UserEmail
          type: string
          description: Email of the user
        approverId:
          title: ApproverId
          type: string
          description: ID of the approver
    EnrolUserResponse:
      title: EnrolUserResponse
      type: object
    EnrolPendingUserRequest:
      title: EnrolPendingUserRequest
      type: object
      required:
        - userId
        - userEmail
        - approverId
        - source
      properties:
        userId:
          title: UserId
          type: string
          description: ID of the user
        userEmail:
          title: UserEmail
          type: string
          description: Email of the user
        approverId:
          title: ApproverId
          type: string
          description: ID of the approver
        source:
          title: Source
          type: string
          description: Source or origin of the request
    EnrolPendingUserResponse:
      title: EnrolPendingUserResponse
      type: object
    RemoveUsersRequest:
      title: RemoveUsersRequest
      type: object
      properties:
        userIds:
          title: UserIds
          type: array
          description: User IDs
          items:
            type: string
    RemoveUsersResponse:
      title: RemoveUsersResponse
      type: object
    AssignUserRequest:
      title: AssignUserRequest
      type: object
      properties:
        userId:
          title: UserId
          type: string
          description: User TID
        roles:
          title: Roles
          type: array
          description: User roles in the project
          items:
            type: string
    AssignUserResponse:
      title: AssignUserResponse
      type: object
    ReAssignUsersRequest:
      title: ReAssignUsersRequest
      type: object
      properties:
        roles:
          title: Roles
          type: array
          description: Users roles in the project
          items:
            type: string
        userIds:
          title: UserIds
          type: array
          description: User IDs in the project
          items:
            type: string
    ReAssignUsersResponse:
      title: ReAssignUsersResponse
      type: object
    GetProjectAssignmentsResponseItem:
      title: GetProjectAssignmentsResponseItem
      type: object
      properties:
        userId:
          title: UserId
          type: string
          description: User TID
        roles:
          title: Roles
          type: array
          description: User roles in the project
          items:
            type: string
        userEmail:
          title: UserEmail
          type: string
          description: Email address of the user
    GetProjectAssignmentsResponse:
      title: GetProjectAssignmentsResponse
      type: object
      properties:
        assignments:
          title: Assignments
          type: array
          items:
            "$ref": "#/components/schemas/GetProjectAssignmentsResponseItem"
    UnAssignUserResponse:
      title: UnAssignUserResponse
      type: object
    GetUserRolesResponse:
      title: GetUserRolesResponse
      required:
        - roles
      type: object
      properties:
        roles:
          title: roles
          type: array
          items:
            type: string
  securitySchemes:
    ClientCredentials:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: cognito_user_pools
      x-amazon-apigateway-authorizer:
        type: cognito_user_pools
        providerARNs:
          - "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/{{user_pool_id}}"
