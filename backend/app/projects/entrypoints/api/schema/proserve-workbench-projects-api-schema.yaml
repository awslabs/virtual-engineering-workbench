        - name
      properties:
        id:
          title: Id
          type: string
          description: The ID of the technology
        name:
          title: Name
          type: string
          description: The name of the technology
        description:
          title: Description
          type: string
          description: The description of the technology
    AddTechnologyRequest:
      title: AddTechnologyRequest
