components:
  schemas:
    Empty:
      title: "Empty Schema"
      type: "object"
    User:
      title: User
      type: object
      required:
        - userId
      properties:
        userId:
          title: UserId
          type: string
          description: Unique ID of the user.
        userEmail:
          title: UserEmail
          type: string
          description: Email of a user.
    Project:
      title: Project
      type: object
      required:
        - projectId
      properties:
        projectId:
          title: ProjectId
          type: string
          description: Unique ID of the project.
        projectName:
          title: ProjectName
          type: string
          description: Name of the project.
        projectDescription:
          title: ProjectDescription
          type: string
          description: Description of the project.
        isActive:
          title: IsActive
          type: boolean
          description: Project active flag
        createDate:
          title: CreateDate
          type: string
          description: Point in time where project is created.
        lastUpdateDate:
          title: LastUpdateDate
          type: string
          description: Point in time where project is last updated.
    ProjectAssignment:
      title: ProjectAssignment
      type: object
      properties:
        projectId:
          title: ProjectId
          type: string
          description: Unique ID of the project.
        roles:
          title: Roles
          type: array
          description: User roles in the project.
          items:
            type: string
        activeDirectoryGroups:
          title: ActiveDirectoryGroups
          type: array
          description: Active directory groups that the user is member of
          items:
            "$ref": "#/components/schemas/GetProjectAssignmentsResponseItemADGroup"
        activeDirectoryGroupStatus:
          title: ActiveDirectoryGroupStatus
          type: string
          description: Status of adding the user to the AD groups
        userEmail:
          title: UserEmail
          type: string
          description: User email.
    ProjectEnrolment:
      title: ProjectEnrolment
      type: object
      required:
        - projectId
        - status
      properties:
        projectId:
          title: ProjectId
          type: string
          description: Unique ID of the project enrolment.
        status:
          title: Status
          type: string
          description: Status of the project enrolment.
    ProjectAccount:
      title: ProjectAccount
      type: object
      required:
        - awsAccountId
        - accountType
        - technologyId
      properties:
        id:
          title: Id
          type: string
          description: Unique ID of the account.
        awsAccountId:
          title: AwsAccountId
          type: string
          description: Unique ID of the AWS account.
        accountType:
          title: AccountType
          type: string
          description: Type of the account.
        accountName:
          title: AccountName
          type: string
          description: Name of the account.
        accountDescription:
          title: AccountDescription
          type: string
          description: Description of the account.
        createDate:
          title: CreateDate
          type: string
          description: Point in time where account is created.
        lastUpdateDate:
          title: LastUpdateDate
          type: string
          description: Point in time where account is last updated.
        accountStatus:
          title: AccountStatus
          type: string
          description: Account status
        stage:
          title: Stage
          type: string
          description: The stage account represents. Possible values dev, qa, prod
        technologyId:
          title: TechnologyId
          type: string
          description: The reference to the associated technology platform
        region:
          title: region
          type: string
          description: Region in which workbenches will be provisioned in this account.
        lastOnboardingResult:
          title: LastOnboardingResult
          type: string
          description: Result of the last onboarding / reonboarding
        lastOnboardingErrorMessage:
          title: LastOnboardingErrorMessage
          type: string
          description: Error message of the last onboarding / reonboarding if it failed
    Technology:
      title: Technology
