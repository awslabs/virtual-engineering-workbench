components:
  schemas:
    Empty:
      title: "Empty Schema"
      type: "object"
    VersionSummary:
      title: Version
      type: object
      required:
        - versionId
        - name
        - versionType
        - stages
        - status
        - recommendedVersion
        - lastUpdate
      properties:
        versionId:
          title: VersionId
          type: string
          description: The id of the version
        name:
          title: Name
          type: string
          description: The version number
        description:
          title: Description
          type: string
          description: The description for the version
        versionType:
          title: VersionType
          type: string
          description: The version type (RELEASE_CANDIDATE|RELEASED|RESTORED)
        stages:
          title: Stages
          type: array
          items:
            type: string
        status:
          title: Status
          type: string
          description: Status of the version summary (CREATED|FAILED|RETIRED|PROCESSING).
        recommendedVersion:
          title: RecommendedVersion
          type: boolean
          description: Flag that indicates if version is recommended
        lastUpdate:
          title: LastUpdate
          type: string
          description: Timestamp of when the last change happened to the version
        lastUpdatedBy:
          title: LastUpdatedBy
          type: string
          description: User ID of the person who last changed the version
        restoredFromVersionName:
          title: RestoredFromVersionName
          type: string
          description: Name of the version that this version is restored from, if it is restored
        originalAmiId:
          title: OriginalAmiId
          type: string
          description: AMI ID of the original image
    Product:
      title: Product
      type: object
      required:
        - projectId
        - productId
        - technologyId
        - technologyName
        - status
        - productName
        - productType
        - createDate
        - lastUpdateDate
        - createdBy
        - lastUpdatedBy
      properties:
        projectId:
          title: ProjectId
          type: string
          description: The reference to the associated project.
        productId:
          title: ProductId
          type: string
          description: Unique ID of the product.
        technologyId:
          title: TechnologyId
          type: string
          description: The reference to the associated technology id.
        technologyName:
          title: TechnologyName
          type: string
          description: The reference to the associated technology name.
        status:
          title: Status
          type: string
          description: Status of the product (CREATING|CREATED|FAILED|PAUSED|ARCHIVING|ARCHIVED).
        productName:
          title: ProductName
          type: string
          description: Name of the product.
        productType:
          title: ProductType
          type: string
          description: Type of the product (WORKBENCH).
        productDescription:
          title: ShortDescription
          type: string
          description: Description of the product.
        recommendedVersionId:
          title: RecommendedVersionId
          type: string
          description: Recommended version ID of the product.
        availableStages:
          title: AvailableStages
          type: array
          items:
            type: string
        availableRegions:
          title: AvailableRegions
          type: array
          items:
            type: string
        createDate:
          title: CreateDate
          type: string
          description: Creation date of the product.
        lastUpdateDate:
          title: LastUpdateDate
          type: string
          description: Last update date of the product.
        createdBy:
          title: CreatedBy
          type: string
          description: User that created the product.
        lastUpdatedBy:
          title: LastUpdatedBy
          type: string
          description: User that performed the last update on the product.
        versions:
          title: Versions
          type: array
          items:
