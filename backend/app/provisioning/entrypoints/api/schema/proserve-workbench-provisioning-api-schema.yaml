          type: integer
          description: Average provisioning time of a product.
        availableStages:
          title: AvailableStages
          type: array
          items:
            type: string
        availableRegions:
          title: AvailableRegions
          type: array
          items:
            type: string
        availableTools:
          title: AvailableTools
          type: array
          items:
            type: string
          description: Software Tools available in the product.
        availableOSVersions:
          title: AvailableOSVersions
          type: array
          items:
            type: string
          description: Operating System versions available for the product.
