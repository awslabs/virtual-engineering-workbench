[mypy]
# Disable error codes that fail on existing untyped code.
# Remove codes incrementally as type coverage improves.
disable_error_code =
    arg-type,
    assignment,
    attr-defined,
    call-arg,
    call-overload,
    dict-item,
    empty-body,
    func-returns-value,
    import-untyped,
    index,
    misc,
    no-any-return,
    no-redef,
    operator,
    return,
    return-value,
    syntax,
    type-arg,
    type-var,
    union-attr,
    valid-type,
    var-annotated
exclude = (__pycache__|\.venv|setup|tests)
explicit_package_bases = True
ignore_missing_imports = True
python_version = 3.13
